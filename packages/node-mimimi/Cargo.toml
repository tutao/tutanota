[package]
edition = "2021"
name = "tutao_node-mimimi"
version = "244.240917.0"

[lib]
# need to have lib to be able to use this from rust examples
crate-type = ["cdylib", "lib"]

[profile.release]
lto = true
strip = "symbols"


[dependencies]
tuta-sdk = { path = "../../tuta-sdk/rust/sdk", features = ["net"] }
tuta-imap = { path = "../tuta-imap" }
async-trait = "0.1.83"
rand = { version = "0.8.5" }
mail-parser = { git = "https://github.com/stalwartlabs/mail-parser", rev = "54ca7df" }
thiserror = { version = "1.0.64" }
# Default enable napi4 feature, see https://nodejs.org/api/n-api.html#node-api-version-matrix
napi = { version = "2.16.12", default-features = false, features = ["napi9", "async", "tokio_rt"], optional = true }
napi-derive = { version = "2.16.12", optional = true }


[build-dependencies]
napi-build = { version = "2.1.3" }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
mail-builder = { git = "https://github.com/stalwartlabs/mail-builder", rev = "c2b37e9" }

[features]
default = ["javascript"]
# needed to turn off the autogenerated ffi when using the examples
javascript = ["dep:napi", "dep:napi-derive"]

[[example]]
name = "http_request"
path = "examples/http_request.rs"

[[example]]
name = "imap_mail_as_draft"
path = "examples/imap_mail_as_draft.rs"
