#  XCodeGen configuration file
name: tutanooota #FIXME switch this back to 'tutanota' when finished testing
options:
  minimumXCodeGenVersion: 2.41.0
  createIntermediateGroups: true
  bundleIdPrefix: "de.tutao.tutanota"
  developmentLanguage: "en"
  usesTabs: true
  tabWidth: 4 # Keep this in sync with the `.swift-format.json`
  deploymentTarget:
    iOS: "15.0"
  # defaultConfig?
  groupSortPosition: "top"
  # groupOrdering?
  transitivelyLinkDependencies: false
  # generateEmptyDirectories?
  localPackagesGroup: ""
  useBaseInternationalization: true
  schemePathPrefix: "../" # Recommended for workspaced based projects by XCodeGen devs
configs:
  Debug Development: "debug"
  Debug Staging: "debug"
  Debug Production: "debug"
  Release Development: "release"
  Release Staging: "release"
  Release Production: "release"
settings: 
  base:
    PRODUCT_NAME: "tutanota"
    DEVELOPMENT_TEAM: "JKCH89Z3M9" # Tutao GmbH
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_ENTITLEMENTS: "$(TARGET_NAME)/$(TARGET_NAME)$(CONFIGURATION).entitlements"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"      
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"   
    SUPPORTS_MACCATALYST: "NO"
    SWIFT_VERSION: "5.0"
    COPY_PHASE_STRIP: "NO"
    ALWAYS_SEARCH_USER_PATHS: "NO"
    GCC_DYNAMIC_NO_PIC: "NO"
    GCC_C_LANGUAGE_STANDARD: "gnu17"
    CLANG_ENABLE_MODULES: "YES"
    CLANG_WARN_SUSPICIOUS_IMPLICIT_CONVERSION: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024 Tutao GmbH. All rights reserved."
  configs:
    Debug Development: 
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: "Automatic"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanota.debug"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      ONLY_ACTIVE_ARCH: "YES"
      ENABLE_TESTABILITY: "YES"
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
    Debug Staging:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: "Automatic"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanota.test"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      ONLY_ACTIVE_ARCH: "YES"
      ENABLE_TESTABILITY: "YES"
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
    Debug Production:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: "Automatic"
      CODE_SIGN_ENTITLEMENTS: "$(TARGET_NAME)/$(TARGET_NAME).entitlements"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanota"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      ONLY_ACTIVE_ARCH: "YES"
      ENABLE_TESTABILITY: "YES"
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
    Release Development: 
      CODE_SIGN_IDENTITY: "iPhone Distribution"
      CODE_SIGN_STYLE: "Manual"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanota.debug"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: "YES"
    Release Staging:
      CODE_SIGN_IDENTITY: "iPhone Distribution"
      CODE_SIGN_STYLE: "Manual"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanota.test"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: "YES"
    Release Production:
      CODE_SIGN_IDENTITY: "iPhone Distribution"
      CODE_SIGN_STYLE: "Manual"
      CODE_SIGN_ENTITLEMENTS: "$(TARGET_NAME)/$(TARGET_NAME).entitlements"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanota"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: "YES"
# SettingsGroups?
targets:
  tutanota:
    templates: ["formatAndLint"]
    type: "application"
    sources: 
      - path: "tutanota"
        excludes: [
          "tutanota-web", 
          "Sources/Crypto/liboqs", 
          "Sources/Crypto/phc-winner-argon2",
          "Sources/sdktest.swift"
        ]
        compilerFlags: [
          "-I$(BUILD_DIR)/liboqs-include",
          "-Itutanota/Sources/Crypto/phc-winner-argon2/include"
        ]
        # XCode will not resolve symbolic links when adding a folder reference, so we will just use a relative path
      - path: "../build"
        name: "build"
        type: "folder"
        buildPhase: "resources"
    settings:
      base:
        PRODUCT_MODULE_NAME: "tutanota"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
        INFOPLIST_FILE: "tutanota/Info.plist"
        SWIFT_OBJC_BRIDGING_HEADER: "tutanota/Sources/tutanota-Bridging-Header.h"
        HEADER_SEARCH_PATHS: [
          "$(BUILD_DIR)/liboqs-include",
          "${PROJECT_DIR}/tutanota/include",
          "tutanota/Sources/Crypto/phc-winner-argon2/include"
        ]
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++14"
        GCC_PREPROCESSOR_DEFINITIONS: [
            "SQLITE_HAS_CODEC=1",
            "OQS_ENABLE_KEM_kyber_1024=1",
             "$(inherited)"
        ]
        OTHER_CFLAGS[arch=*]: [
            "-DSQLITE_HAS_CODEC",
            "-DSQLITE_TEMP_STORE=3",
            "-DSQLCIPHER_CRYPTO_CC",
            "-DNDEBUG",
            "-DKYBER_K=4",
            "-DOQS_VERSION_TEXT=\\\"whatever\\\"",
            "-DOQS_ENABLE_KEM_kyber_1024=1",
            "-DOQS_DIST_BUILD=1",
            "-DOQS_ENABLE_KEM_KYBER=1"
        ]
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"      
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"   
      configs:
        Debug Development:
          PRODUCT_NAME: "Tuta D"
        Debug Staging:
          PRODUCT_NAME: "Tuta Test"
        Debug Production: 
          PRODUCT_NAME: "Tuta Mail"
        Release Development: 
          PRODUCT_NAME: "Tuta D"
          PROVISIONING_PROFILE_SPECIFIER: "match AdHoc de.tutao.tutanota"
        Release Staging: 
          PRODUCT_NAME: "Tuta Test"
          PROVISIONING_PROFILE_SPECIFIER: "match AdHoc de.tutao.tutanota.test"
          PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: "match AdHoc de.tutao.tutanota.test 1716556941"
        Release Production: 
          PRODUCT_NAME: "Tuta Mail"
          PROVISIONING_PROFILE_SPECIFIER: "match AdHoc de.tutao.tutanota"
    dependencies:
      - package: Atomics
      - package: Alamofire
      - sdk: CryptoTokenKit.framework
        embed: false
        # FIXME make `CryptoTokenKit.framework` optional
      - package: DictionaryCoding
      - sdk: Foundation.framework
        embed: false
      - framework: libcrypto.xcframework
        embed: false
      - sdk: Security.framework
        embed: false
      - target: TutanotaNotificationExtension
        codeSign: false
      - target: TutanotaSharedFramework
      - target: TutanotaShareExtension
        codeSign: false
      # - target: tutasdk/tutasdk
      - target: oqs
      - target: argon2
  oqs:
    type: "library.static"
    settings:
      PRODUCT_NAME: "oqs"
    sources:
      - path: "tutanota/Sources/Crypto/liboqs"
        includes: [
          "src/kem/kem.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/kem.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/verify.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/indcpa.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/symmetric-shake.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/poly.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/polyvec.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/cbd.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/ntt.c",
          "src/kem/kyber/pqcrystals-kyber_kyber1024_ref/reduce.c",
          "src/kem/kyber/kem_kyber_1024.c",
          "src/common/pqclean_shims/fips202.c",
          "src/common/sha3/xkcp_sha3.c",
          "src/common/sha3/xkcp_low/KeccakP-1600/plain-64bits/KeccakP-1600-opt64.c",
          "src/common/common.c",
        ]
        compilerFlags: [
          "-I$(BUILD_DIR)/liboqs-include",
          "-Itutanota/Sources/Crypto/liboqs/src/common/pqclean_shims",
          "-Itutanota/Sources/Crypto/liboqs/src/kem/kyber/pqcrystals-kyber_kyber1024_ref",
          "-Itutanota/Sources/Crypto/liboqs/src/common/pqclean_shims",
          "-DOQS_VERSION_TEXT=\\\"tutakyber\\\"",
          "-DOQS_ENABLE_KEM_kyber_1024=1",
          "-DOQS_ENABLE_KEM_KYBER=1",
          "-DOQS_DIST_BUILD=1",
          "-DKYBER_K=4"
        ]
    platform: "iOS"
    preBuildScripts:
      - path: "buildScripts/generate-include.sh"
        name: "Generate liboqs' headers"
        shell: "/bin/sh"
        showEnvVars: true
        basedOnDependencyAnalysis: true
        outputFiles: ["$(BUILD_DIR)/liboqs-include"]
  argon2:
    type: "library.static"
    settings:
      PRODUCT_NAME: "argon2"
    sources:
      - path: "tutanota/Sources/Crypto/phc-winner-argon2"
        includes: [
          "src/argon2.c",
          "src/core.c",
          "src/encoding.c",
          "src/genkat.c",
          "src/ref.c",
          "src/blake2/blake2b.c"
        ]
        compilerFlags: [
          "-Itutanota/Sources/Crypto/phc-winner-argon2/include",
          "-DARGON2_NO_THREADS",
          "-O3"
        ]
    platform: "iOS"
  tutanotaTests:
    templates: ["formatAndLint"]
    type: "bundle.unit-test"
    sources: "tutanotaTests"
    settings:
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
      CODE_SIGN_STYLE: "Automatic"
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
      BUNDLE_LOADER: "$(TEST_HOST)"
      INFOPLIST_FILE: "tutanotaTests/Info.plist"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanotaTests"
      PRODUCT_NAME: "$(TARGET_NAME)"
      HEADER_SEARCH_PATHS: "${PROJECT_DIR}/tutanota/include\"/**"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tuta D.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tuta D"
      SWIFT_OBJC_BRIDGING_HEADER: "tutanotaTests/tutanotaTests-Bridging-Header.h"
      SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"      
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"   
      CLANG_CXX_LANGUAGE_STANDARD: "gnu++14"
    dependencies: 
      - target: "tutanota"
  TutanotaShareExtension:
    templates: ["formatAndLint"]
    type: "app-extension"
    sources: "TutanotaShareExtension"
    settings:
      base:
        PRODUCT_NAME: "TutanotaShareExtension"
        PRODUCT_BUNDLE_IDENTIFIER: "$(inherited).TutanotaShareExtension"
        SKIP_INSTALL: "YES"
        IPHONEOS_DEPLOYMENT_TARGET: "15.5" # Why?
        INFOPLIST_KEY_CFBundleDisplayName: "TutanotaShareExtension"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: "TutanotaShareExtension/Info.plist"
        HEADER_SEARCH_PATHS: "\"${PROJECT_DIR}/tutanota/include\"/**"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "3.104.5"
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"      
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"   
      configs:
        Release Production: 
          PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: "match AdHoc de.tutao.tutanota.TutanotaShareExtension"
        Release Development: 
          PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: "match AdHoc de.tutao.tutanota.TutanotaShareExtension"
    dependencies: 
      - target: "TutanotaSharedFramework"
  TutanotaSharedFramework:
    type: "framework"
    platform: "iOS"
    sources: 
      - path: "TutanotaSharedFramework"
        headerVisibility: "public"
        # Exclude TUTBigNum.h so we change it's visiblity to 'project' in another source
        excludes: ["Crypto/TUTBigNum.h", "*.md"]
      - path: "TutanotaSharedFramework/Crypto"
        includes: ["TUTBigNum.h"]
        headerVisibility: "project"
    settings:
      PRODUCT_NAME: "TutanotaSharedFramework"
      PRODUCT_BUNDLE_IDENTIFIER: "$(inherited).TutanotaSharedFramework"
      INSTALL_PATH: "$(LOCAL_LIBRARY_DIR)/Frameworks"
      GCC_PREPROCESSOR_DEFINITIONS: [
          "SQLITE_HAS_CODEC=1",
            "$(inherited)"
      ]
      OTHER_CFLAGS: [
        "-DSQLITE_HAS_CODEC",
        "-DSQLITE_TEMP_STORE=3",
        "-DNDEBUG",
        "-DSQLCIPHER_CRYPTO_CC"
      ]
      APPLICATION_EXTENSION_API_ONLY: "YES"
      ENABLE_USER_SCRIPT_SANDBOXING: "YES"
      INSTALL_PATH: "$(LOCAL_LIBRARY_DIR)/Frameworks"
      SKIP_INSTALL: "YES"
      DYLIB_COMPATIBILITY_VERSION: "1"
      DYLIB_CURRENT_VERSION: "1"
      DYLIB_INSTALL_NAME_BASE: "@rpath"
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
      LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
      SWIFT_EMIT_LOC_STRINGS: "YES"
      DEFINES_MODULE: "YES"
      GENERATE_INFOPLIST_FILE: "YES"
      CODE_SIGN_STYLE: "Manual"
      PROVISIONING_PROFILE_SPECIFIER: ""
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      VERSIONING_SYSTEM: "apple-generic"
      GCC_NO_COMMON_BLOCKS: "YES"
      CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
      ENABLE_MODULE_VERIFIER: "YES"
      MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
      MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "$(GCC_C_LANGUAGE_STANDARD) $(CLANG_CXX_LANGUAGE_STANDARD)"
      SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"      
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"  
      ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    dependencies:
      - package: DictionaryCoding
        product: "DictionaryCoding"
      - framework: libcrypto.xcframework
        embed: false
  TutanotaNotificationExtension:
    type: "app-extension"
    platform: "iOS"
    sources: 
      - path: "TutanotaNotificationExtension"
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"      
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        GCC_NO_COMMON_BLOCKS: "YES"
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SKIP_INSTALL: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "TutanotaNotificationExtension"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: "TutanotaNotificationExtension/Info.plist"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: "$(inherited).TutanotaNotificationExtension"
      configs:
        Release Staging: 
          PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: "match AdHoc de.tutao.tutanota.test.TutanotaNotificationExtension"
        Release Production: 
          PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: "match AdHoc de.tutao.tutanota.TutanotaNotificationExtension"
    dependencies: 
      - target: "TutanotaSharedFramework"
  TutanotaSharedTests:
    type: "bundle.unit-test"
    platform: "iOS"
    sources: "TutanotaSharedTests"
    settings:
      GCC_NO_COMMON_BLOCKS: "YES"
      CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
      ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
      IPHONEOS_DEPLOYMENT_TARGET: "17.2"
      LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
      SWIFT_EMIT_LOC_STRINGS: "YES"
      GENERATE_INFOPLIST_FILE: "YES"
      PRODUCT_NAME: "$(TARGET_NAME)"
      CODE_SIGN_STYLE: "Automatic"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tuta D.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tuta D"
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
    dependencies: 
      - target: "tutanota"
      - target: "TutanotaSharedFramework"
      - package: "Mockingbird"
    preBuildScripts:
      - path: "buildScripts/generate-mockingbird.sh"
        name: "Generate Mockingbird Mocks"
        shell: "/bin/sh"
        showEnvVars: true
        basedOnDependencyAnalysis: false
        outputFiles: ["$(SRCROOT)/MockingbirdMocks/TutanotaSharedTests-TutanotaSharedFrameworkMocks.generated.swift"]
targetTemplates:
  formatAndLint:
    type: "application"
    platform: "iOS"
    supportedDestinations: ["iOS"]
    preBuildScripts:
      - path: "buildScripts/format.sh"
        name: "Check formating with swift-format"
        shell: "/bin/sh"
        showEnvVars: true
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - path: "buildScripts/lint-xcode.sh"
        name: "Lint with SwiftLint"
        shell: "/bin/sh"
        showEnvVars: true
        basedOnDependencyAnalysis: false
schemes:
  tuta debug:
    build:
      targets: 
        tutanota: ["analyze", "test", "run", "profile"]
        tutanotaTests: ["test"]
  tuta staging:
    build:
      targets: 
        tutanota: "all"
        tutanotaTests: ["test"]
  tuta prod:
    build:
      targets: 
        tutanota: "all"
        tutanotaTests: ["test"]
packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    version: 5.9.1
  DictionaryCoding:
    url: https://github.com/elegantchaos/DictionaryCoding.git
    version: 1.0.9
  Mockingbird:
    url: https://github.com/birdrides/mockingbird.git
    version: 0.20.0
  Atomics:
    url: https://github.com/apple/swift-atomics.git
    version: 1.0.2
projectReferences:
  tutasdk:
    path: "../tuta-sdk/ios/tutasdk.xcodeproj"
