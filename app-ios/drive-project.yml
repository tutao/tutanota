#  XCodeGen configuration file
name: drive
options:
  useBaseInternationalization: true
  schemePathPrefix: "../" # Recommended for workspace based projects by XCodeGen devs
settings:
  base:
    PRODUCT_NAME: "drive"
    DEVELOPMENT_TEAM: "JKCH89Z3M9" # Tutao GmbH
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    bundleIdPrefix: "de.tutao.drive"
# Include MUST come after settings because it depends on bundleIdPrefix
include:
  - path: "../xcodegen_common.yml"
  - path: "./common.yml"
targets:
  drive:
    templates: [ "formatAndLint" ]
    type: "application"
    sources:
      - path: "translations"
      - path: "drive"
        excludes:
          [
            "drive-web",
            "Sources/sdktest.swift",
          ]
        compilerFlags: [ ]
      # XCode will not resolve symbolic links when adding a folder reference, so we will just use a relative path
      - path: "../build-drive-app"
        name: "build-drive-app"
        type: "folder"
        buildPhase: "resources"
    settings:
      base:
        PRODUCT_MODULE_NAME: "drive"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
        INFOPLIST_FILE: "drive/Info.plist"
        SWIFT_OBJC_BRIDGING_HEADER: "drive/Sources/drive-Bridging-Header.h"
        HEADER_SEARCH_PATHS: [ ]
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++14"
        GCC_PREPROCESSOR_DEFINITIONS:
          [ "SQLITE_HAS_CODEC=1", "$(inherited)" ]
        OTHER_CFLAGS[arch=*]:
          [
            "-DSQLITE_HAS_CODEC",
            "-DSQLITE_TEMP_STORE=3",
            "-DSQLCIPHER_CRYPTO_CC",
            "-DNDEBUG",
          ]
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_VERSION: "6.0"
        SWIFT_UPCOMING_FEATURE_6_0: "YES"
        SWIFT_APPROACHABLE_CONCURRENCY: "YES"
        SWIFT_UPCOMING_FEATURE_INTERNAL_IMPORTS_BY_DEFAULT: "YES"
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: "YES"
        SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: "YES"
      configs:
        Debug Development:
          PRODUCT_NAME: "Tuta Drive-D"
        Debug Staging:
          PRODUCT_NAME: "Tuta Drive-T"
        Debug Production:
          PRODUCT_NAME: "Tuta Drive"
        Release Development:
          PRODUCT_NAME: "Tuta Drive-D"
        Release Staging:
          PRODUCT_NAME: "Tuta Drive-T"
        Release Production:
          PRODUCT_NAME: "Tuta Drive"
      groups:
        - "codeSigning"
    dependencies:
      - package: Atomics
      - sdk: CryptoTokenKit.framework
        embed: false
      - package: DictionaryCoding
      - sdk: Foundation.framework
        embed: false
      - sdk: Security.framework
        embed: false
      - target: TutanotaSharedFramework
      - target: TutanotaShareExtension
        codeSign: false
      - framework: tutasdk.framework
        embed: false
      - framework: StoreKit.framework
        embed: false
      - package: Mockable
        product: "Mockable"
  tutanotaTests:
    templates: [ "formatAndLint" ]
    type: "bundle.unit-test"
    sources:
      - path: "tutanotaTests"
        excludes: [ "MailToTest.swift" ]
    settings:
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
      CODE_SIGN_STYLE: "Automatic"
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
      BUNDLE_LOADER: "$(TEST_HOST)"
      INFOPLIST_FILE: "tutanotaTests/Info.plist"
      PRODUCT_BUNDLE_IDENTIFIER: "de.tutao.tutanotaTests"
      PRODUCT_NAME: "$(TARGET_NAME)"
      HEADER_SEARCH_PATHS: [ ]
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tuta Drive-D.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tuta Drive-D"
      SWIFT_OBJC_BRIDGING_HEADER: "tutanotaTests/tutanotaTests-Bridging-Header.h"
      SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
      CLANG_CXX_LANGUAGE_STANDARD: "gnu++14"
      SWIFT_VERSION: "6.0"
      SWIFT_APPROACHABLE_CONCURRENCY: "YES"
    dependencies:
      - target: "drive"
      - target: "TutanotaSharedFramework"
  TutanotaSharedTests:
    type: "bundle.unit-test"
    platform: "iOS"
    sources:
      - path: "TutanotaSharedTests"
    settings:
      GCC_NO_COMMON_BLOCKS: "YES"
      CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
      ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
      SWIFT_EMIT_LOC_STRINGS: "YES"
      GENERATE_INFOPLIST_FILE: "YES"
      PRODUCT_NAME: "$(TARGET_NAME)"
      CODE_SIGN_STYLE: "Automatic"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tuta Drive-D.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tuta Drive-D"
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      SWIFT_VERSION: "6.0"
      SWIFT_APPROACHABLE_CONCURRENCY: "YES"
    dependencies:
      - target: "drive"
      - target: "TutanotaSharedFramework"
        embed: false
      - framework: tutasdk.framework
        embed: false
      - package: Mockable
        product: "Mockable"
schemes:
  drive debug:
    build:
      targets:
        drive: [ "analyze", "test", "run", "profile" ]
        tutanotaTests: [ "test" ]
    run:
      config: "Debug Development"
      storeKitConfiguration: "Plans.storekit"
    test:
      config: "Debug Development"
      targets: [ "tutanotaTests" ]
    archive:
      config: "Release Development"
  drive staging:
    build:
      targets:
        drive: "all"
        tutanotaTests: [ "test" ]
    run:
      config: "Debug Staging"
    test:
      config: "Debug Staging"
      targets: [ "tutanotaTests" ]
    archive:
      config: "Release Staging"
  drive prod:
    build:
      targets:
        drive: "all"
        tutanotaTests: [ "test" ]
    run:
      config: "Debug Production"
    test:
      config: "Debug Production"
      targets: [ "tutanotaTests" ]
    archive:
      config: "Release Production"
